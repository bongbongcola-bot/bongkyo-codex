<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Mood Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-theme="0">
  <main class="app">
    <section class="card" aria-live="polite">
      <p class="eyebrow">Simple Visual Demo</p>
      <h1 id="title">차분한 시작</h1>
      <p id="description">
        작은 변화가 화면 전체의 분위기를 바꾸는 예제입니다.
      </p>
    </section>

    <div class="controls">
      <button id="nextButton" type="button">다음 분위기</button>
      <button id="resetButton" type="button" class="secondary">초기화</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
